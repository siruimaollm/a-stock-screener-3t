# ==================== 数据配置 ====================
data:
  db_path: "data/kline.duckdb"
  stock_data_db: "data/stock_data.db"  # 新数据源：5年后复权行情 + 股票信息
  ingest_since: "2025-04-01"          # 1年数据
  baostock_workers: 4                  # 并发拉取进程数(降低以减少BaoStock断连)
  retry: 3

# ==================== 选股池 ====================
universe:
  min_listed_days: 60                  # 次新股排除阈值
  exclude_st: true

# ==================== 波动率门槛（三段时序版）====================
# 目标：筛出「历史曾大涨放量、近期缩量横盘整理」的股票
# 逻辑：历史大涨放量（60~25日前）→ 近期缩量横盘（30日）→ 当前未急跌
volatility:
  # 基础门槛
  min_close: 3.0                       # 收盘价 ≥ 3元
  min_avg_amount: 50000000             # 5日均成交额 ≥ 5000万

  # 第一段：历史曾大涨放量
  rally_lookback: 60                   # 历史窗口（日）
  rally_min_pct: 0.25                  # 最小涨幅 25%
  rally_vol_ratio: 1.3                 # 上涨段均量 > 90日均量×1.3
  rally_min_days: 5                    # 上涨段最少持续天数

  # 第二段：近期缩量横盘
  consol_window: 30                    # 横盘检测窗口（日）
  range_max_pct: 0.20                  # 近30日价格区间/均价 ≤ 20%
  drawdown_min: 0.40                   # 当前价 ≥ 60日高点×40%
  drawdown_max: 0.90                   # 当前价 ≤ 60日高点×90%
  directional_vol_shrink: true         # 第一层只做方向性缩量判断，避免与第二层重复惩罚
  vol_shrink_short_window: 10          # 短周期均量窗口
  vol_shrink_long_window: 60           # 长周期均量窗口
  vol_shrink_ratio: 0.80               # 兼容旧逻辑；directional_vol_shrink=false 时生效
  atr_shrink_ratio: 0.85               # 近10日ATR < 近30日ATR×0.85

  # 第三段：当前未在急跌
  cum_5d_min: -0.10                    # 近5日累计跌幅 > -10%

  # 旧接口兼容（不再使用）
  amp30_min: 0.15
  atr_pct_ratio: 1.2
  bb_width_quantile: 0.65
  lookback: 90

# ==================== 打分体系（重构版，满分15分）====================
# 5维度：BOLL + RSI + KDJ + 量价 + 蜡烛，每维度0-3分
# 必要条件：BOLL≥1（触及下轨）+ 量价≥1 或 蜡烛≥2
# 总分 ≥ 10 入选
scoring:
  threshold: 8                         # 强确认总分门槛（优化后默认）
  weak_confirmation_threshold: 9       # 弱确认需要更高总分
  require_all_dimensions: true         # 保留兼容接口
  require_rsi_divergence: false        # RSI底背离为加分项，非硬性要求（得分已体现）
  rsi_long_oversold: 40                # RSI6 < 40 视为超卖
  min_candle_score: 1                  # 剔除 candle_score=0 的弱反转票
  min_vol_score: 0
  min_total_score: null
  require_rsi_or_kdj_score_sum: 1      # 至少保留一项反转动量确认

# ==================== 指标参数(用户指定) ====================
indicators:
  rsi_periods: [6, 12, 24]             # 短=6 / 中=12 / 长=24，评分用 6+12 双周期
  kdj_period: 9
  kdj_smooth: 3
  boll_period: 14
  boll_std: 2
  atr_period: 14

# ==================== 选股输出 ====================
pick:
  top_n: 50                            # 最多输出只数
  output_dir: "output"

# ==================== 回测配置 ====================
backtest:
  start_date: "2021-01-04"
  end_date: "2026-04-25"
  out_of_sample_start: "2025-04-01"
  out_of_sample_end: "2025-06-30"
  top_n: 20                            # 每期选股数
  hold_periods: [5, 10, 20]           # 持有期(交易日)
  benchmark: "sh.000300"              # 沪深300
  # 达标门槛
  pass_criteria:
    hold10_excess_win_rate: 0.55       # 10日超额胜率
    hold10_excess_return_mean: 0.015   # 10日平均超额收益
    hold20_return_mean: 0.03           # 20日平均收益
    hold20_max_loss: -0.25             # 20日最大单笔亏损
    any_win_rate: 0.50                 # 任一持有期总胜率

# ==================== 回测 v2（新出场规则）====================
# 出场逻辑：
#   止盈：+10% 或 收盘≥布林上轨 (先到先得)
#   止损：破位 (close ≤ entry × (1 - break_down_pct))
#   超时：持有满 max_hold 交易日
backtest_v2:
  take_profit:    0.10           # 固定止盈阈值
  break_down_pct: 0.08           # 破位止损阈值（8%）
  max_hold:       252            # 最长持有交易日（≈1年）
  signal_freq:    "biweekly"     # 信号扫描频率：weekly / biweekly / monthly / daily
  stop_loss_mode: "intraday"     # close=收盘破位止损, intraday=日内触价止损
  fail_exit_days: 8              # 最优实验结果：持有 8 日仍未转正则失效退出
  fail_exit_min_return: 0.0      # 与 fail_exit_days 配合使用
  min_candle_score: 0            # 选股过滤已放入 scoring；此处保留兼容
  min_vol_score: 0               # 回测实验用：最低量价分
  min_total_score: null          # 回测实验用：额外最低总分
  require_rsi_or_kdj_score_sum: 0  # 选股过滤已放入 scoring；此处保留兼容

# ==================== 妙想 API ====================
miao:
  api_key: ""   # 留空则自动从环境变量 MX_APIKEY 读取
  # 使用方式：
  #   python run.py miao-data   --query "贵州茅台近一年收盘价"
  #   python run.py miao-search --query "宁德时代最新研报"
  #   python run.py miao-xuangu --query "今日A股主板涨幅大于5%"

# ==================== 调参网格 ====================
tuner:
  amp30_candidates: [0.12, 0.15, 0.20]
  score_threshold_candidates: [5, 6, 7]
  atr_pct_ratio_candidates: [1.2, 1.5, 2.0]
  bb_width_quantile_candidates: [0.6, 0.7, 0.8]
